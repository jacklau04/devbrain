# devbrain — gate merges on the aggregate test suite. Capture hooks fail silently,
# so a regression in capture/redact/memory only surfaces at a later empty /distill.
name: test

# CI runs only on `main`. The nightshift fleet opens one PR per task into `nightshift`;
# the local merge gate already replicates the suite per branch, so per-task CI is noise.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      # The whole suite is Go now: unit, golden, and CLI black-box tests that
      # build the binary and drive it as a subprocess (internal/clitest). The
      # docker clean-room and npm-pack tests run where those tools exist (ubuntu)
      # and t.Skip cleanly otherwise (macos).
      - name: Go vet + full test suite
        run: go vet ./... && go test -race ./...
