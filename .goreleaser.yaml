# goreleaser — builds the static devbrain binary for darwin/linux on
# amd64/arm64 and publishes the Homebrew formula to TheWeiHu/homebrew-devbrain.
# Snapshot builds: `goreleaser release --snapshot --clean` (no tag needed).
version: 2

project_name: devbrain

builds:
  - main: ./cmd/devbrain
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/TheWeiHu/devbrain/internal/version.Version={{.Version}}
      - -X github.com/TheWeiHu/devbrain/internal/version.Commit={{.ShortCommit}}

archives:
  - formats: [tar.gz]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  # No hand-maintained CHANGELOG — the git log is the source of truth. Release
  # notes are generated from the commits between tags and land in the GitHub Release.
  use: git
  sort: asc
  filters:
    exclude:
      - '^nightshift: merge '
      - '^Merge '
      - '^docs:'
      - '^test:'

# Publish immediately (not a draft) so the release assets are live the moment the
# generated formula points at them — no window where `brew install` 404s. This is what
# lets the tap push (scripts/brew-formula-push.sh) be a simple direct commit instead of
# a PR-and-merge dance.
release:
  draft: false

# The Homebrew formula is NOT published from here anymore: goreleaser retired its
# formula generator (`brews`) in favor of homebrew_casks, which is macOS-only — and the
# FORMULA is what keeps `brew install` working on Linux too. The release workflow
# (.github/workflows/release.yml, on tag push; `make release` is the manual fallback)
# chains `goreleaser release` with scripts/brew-formula-push.sh, which renders the
# formula from dist/checksums.txt and pushes it to the tap once the assets are live
# (global after hooks would do this inline, but they're goreleaser-Pro-only). The tap
# push needs write on the SEPARATE homebrew-devbrain repo: TAP_GITHUB_TOKEN in CI, a
# personal PAT locally.
