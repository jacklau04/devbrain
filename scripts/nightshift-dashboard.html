<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>nightshift</title>
<style>
  :root { --bg:#0b0f17; --panel:#141a26; --edge:#222c3d; --txt:#dbe3f0; --dim:#7d8aa3;
          --ok:#3fd07f; --warn:#ffcf5c; --bad:#ff6b6b; --accent:#6ea8ff; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt); font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace; }
  header { display:flex; align-items:center; justify-content:center; gap:14px; padding:12px 18px; border-bottom:1px solid var(--edge); position:sticky; top:0; background:var(--bg); }
  header h1 { font-size:16px; margin:0; letter-spacing:.5px; }
  .moon { font-size:18px; }
  .pill { padding:2px 9px; border-radius:999px; font-size:12px; border:1px solid var(--edge); color:var(--dim); }
  .pill.live { color:var(--ok); border-color:var(--ok); }
  .pill.dead { color:var(--bad); border-color:var(--bad); }
  .grow { flex:1; }
  .upd { color:var(--dim); font-size:12px; position:absolute; right:18px; top:15px; }
  .needs { margin:14px 18px 0; padding:12px 16px; border:1px solid var(--warn); background:#2a2410; border-radius:10px; color:var(--warn); }
  .needs b { color:#fff; }
  .needs .ids { color:var(--txt); margin-top:6px; word-break:break-word; }
  .needs .acts { margin-left:8px; white-space:nowrap; }
  .needs button { font:11px ui-monospace,monospace; background:#1d2738; color:var(--txt); border:1px solid var(--edge); border-radius:6px; padding:2px 9px; margin-left:6px; cursor:pointer; }
  .needs button:hover { border-color:var(--accent); color:var(--accent); }
  .wrap { display:grid; grid-template-columns:repeat(auto-fit,minmax(440px,1fr)); gap:14px; padding:16px 18px; }
  .card { background:var(--panel); border:1px solid var(--edge); border-radius:10px; overflow:hidden; }
  .card h2 { margin:0; padding:9px 13px; font-size:13px; border-bottom:1px solid var(--edge); display:flex; align-items:center; gap:8px; }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--dim); }
  .dot.working { background:var(--ok); box-shadow:0 0 8px var(--ok); animation:pulse 1.4s infinite; }
  .dot.idle { background:var(--dim); }
  @keyframes pulse { 50% { opacity:.4; } }
  .task { color:var(--accent); }
  pre { margin:0; padding:11px 13px; max-height:340px; overflow:auto; white-space:pre-wrap; word-break:break-word; color:#c4ccda; font-size:12.5px; background:#0d121c; }
  .scoreboard { padding:12px 18px; }
  .counts { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px; justify-content:center; }
  .stat { background:var(--panel); border:1px solid var(--edge); border-radius:9px; padding:9px 14px; min-width:90px; text-align:center; }
  .stat .n { font-size:22px; font-weight:600; }
  .stat .l { color:var(--dim); font-size:11px; text-transform:uppercase; letter-spacing:.6px; }
  .feed { background:var(--panel); border:1px solid var(--edge); border-radius:10px; }
  .feed h2 { margin:0; padding:9px 13px; font-size:13px; border-bottom:1px solid var(--edge); text-align:center; }
  .card h2 { justify-content:center; }
  .feed pre { max-height:240px; }
  #chart { width:100%; display:block; height:180px; }
  .card pre { max-height:520px; }   /* worker mirrors: taller, auto-scrolled to bottom */
  .merge { color:var(--ok); }
  footer { color:var(--dim); text-align:center; padding:18px; font-size:12px; }
</style>
</head>
<body>
<header>
  <span class="moon">🌙</span>
  <h1>nightshift</h1>
  <span id="proj" class="pill"></span>
  <span id="run" class="pill"></span>
  <span id="upd" class="upd"></span>
</header>
<div id="needs" class="needs" style="display:none"></div>
<div class="scoreboard">
  <div class="counts" id="counts"></div>
</div>
<div class="scoreboard">
  <div class="feed"><h2>token throughput — out tokens/min over time</h2><canvas id="chart"></canvas></div>
</div>
<div class="wrap" id="workers"></div>
<div class="scoreboard">
  <div class="feed"><h2>staging — merged into the branch you review</h2><pre id="staging"></pre></div>
</div>
<div class="scoreboard">
  <div class="feed"><h2>orchestrator</h2><pre id="log"></pre></div>
</div>
<footer>auto-refreshing · this dashboard is the monitor · stop the fleet: <code>nightshift stop</code></footer>

<script>
const $ = id => document.getElementById(id);
const esc = s => (s||"").replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const k = n => n>=1000 ? (n/1000).toFixed(n>=10000?0:1)+'k' : (n||0);
async function tick() {
  let d;
  try { d = await (await fetch('status.json?_='+Date.now())).json(); }
  catch { $('run').textContent='no data'; $('run').className='pill dead'; return; }
  $('proj').textContent = d.project || '';
  $('run').textContent = d.running ? 'running' : 'stopped';
  $('run').className = 'pill ' + (d.running ? 'live' : 'dead');
  $('upd').textContent = 'updated ' + (d.updated||'').replace('T',' ').replace('Z',' UTC');

  // Needs-you banner — each held task with WHY + the one-command action
  const p = d.parked || [];
  if (p.length) {
    $('needs').style.display = 'block';
    $('needs').innerHTML = `⚠ <b>${p.length} task${p.length>1?'s':''} need you</b> — blocked on a dependency or a failed merge. Click the id to see its diff; the buttons act.`
      + p.map(it => {
          const id = it.id||it, label = it.url ? `<a href="${esc(it.url)}" target="_blank" style="color:var(--accent);font-weight:600">${esc(id)} ↗</a>` : `<b>${esc(id)}</b>`;
          return `<div class="ids">${label} — ${esc(it.reason||'held')}`
            + `<span class="acts">`
            + `<button onclick="act('approve','${esc(id)}')" title="go ahead — run it unattended (downloads/installs allowed)">approve ▶</button>`
            + `<button onclick="act('release','${esc(id)}')" title="retry as-is">release</button>`
            + `<button onclick="act('drop','${esc(id)}')" title="discard (won't-do)">drop</button>`
            + `</span></div>`;
        }).join('')
      + `<div class="ids" style="color:var(--dim)">approve = "I see it, go ahead — do it unattended" · release = retry · drop = discard</div>`;
  } else $('needs').style.display = 'none';

  const q = d.queue || {}, t = d.tokens_min || {};
  $('counts').innerHTML = [
      ['open',q.open],['merged (done)',q.done],['in review',q.review],['parked',p.length],
      ['↑ out/min', k(t.out), 'accent'],['↓ in/min', k(t.in)]
    ].map(([l,n,c]) => `<div class="stat"><div class="n"${c?' style="color:var(--accent)"':''}>${n??0}</div><div class="l">${l}</div></div>`).join('');

  $('workers').innerHTML = (d.workers||[]).map(w => `
    <div class="card">
      <h2><span class="dot ${w.state}"></span>worker ${w.i}
          <span style="color:var(--dim)">·</span> <span class="task">${esc(w.task)}</span>
          <span class="grow"></span>
          <span style="color:var(--accent);font-size:11px">↑${k(w.tout)} tok/min</span>
          <span style="color:var(--dim);font-size:11px">${w.state}</span></h2>
      <pre>${esc(w.pane)||'(booting…)'}</pre>
    </div>`).join('') || '<div class="card"><pre>(no workers running — nightshift start)</pre></div>';
  // keep each worker shell scrolled to the latest line
  document.querySelectorAll('#workers pre').forEach(pre => { pre.scrollTop = pre.scrollHeight; });

  $('staging').innerHTML = (d.staging||[]).map(l=>`<span class="merge">${esc(l)}</span>`).join('\n') || '(nothing merged yet)';
  $('log').textContent = (d.log||[]).join('\n') || '(no log yet)';
  drawChart(d.history || []);
}

function drawChart(hist) {
  const c = $('chart'); if (!c) return;
  const dpr = window.devicePixelRatio || 1;
  const W = c.clientWidth || 800, H = 180;
  c.width = W * dpr; c.height = H * dpr;
  const x = c.getContext('2d'); x.setTransform(dpr,0,0,dpr,0,0); x.clearRect(0,0,W,H);
  if (hist.length < 2) { x.fillStyle='#7d8aa3'; x.font='12px ui-monospace,monospace'; x.fillText('collecting data… (one point per minute)',12,24); return; }
  const pad = {l:52,r:12,t:12,b:22}, pw = W-pad.l-pad.r, ph = H-pad.t-pad.b;
  const maxv = Math.max(100, ...hist.map(p=>p.out||0));
  const X = i => pad.l + pw * (i/(hist.length-1));
  const Y = v => pad.t + ph * (1 - v/maxv);
  x.strokeStyle='#222c3d'; x.fillStyle='#7d8aa3'; x.font='11px ui-monospace,monospace'; x.lineWidth=1;
  for (let g=0; g<=2; g++){ const v=maxv*g/2, yy=Y(v); x.beginPath(); x.moveTo(pad.l,yy); x.lineTo(W-pad.r,yy); x.stroke(); x.fillText(k(Math.round(v)), 6, yy+4); }
  // filled area + line for out tokens/min
  x.beginPath(); hist.forEach((p,i)=>{ const a=X(i),b=Y(p.out||0); i?x.lineTo(a,b):x.moveTo(a,b); });
  x.lineTo(X(hist.length-1),Y(0)); x.lineTo(X(0),Y(0)); x.closePath(); x.fillStyle='rgba(110,168,255,0.16)'; x.fill();
  x.beginPath(); hist.forEach((p,i)=>{ const a=X(i),b=Y(p.out||0); i?x.lineTo(a,b):x.moveTo(a,b); });
  x.strokeStyle='#6ea8ff'; x.lineWidth=2; x.stroke();
  // x labels: ~8 evenly-spaced minute ticks (deduped)
  x.fillStyle='#7d8aa3'; x.textAlign='center';
  const ticks = Math.min(8, hist.length), seen = {};
  for (let j = 0; j < ticks; j++) {
    const i = Math.round(j * (hist.length - 1) / (ticks - 1));
    if (seen[i]) continue; seen[i] = 1;
    x.textAlign = i === 0 ? 'left' : i === hist.length - 1 ? 'right' : 'center';
    x.fillText(hist[i].t || '', X(i), H - 6);
  }
  x.textAlign='start';
}
async function act(cmd, id) {
  if (cmd === 'drop' && !confirm("Drop (won't-do) " + id + "?")) return;
  try {
    const r = await (await fetch(`/action?cmd=${cmd}&id=${encodeURIComponent(id)}`, {method:'POST'})).json();
    if (!r.ok) alert('failed: ' + (r.msg||'?'));
  } catch (e) { alert('action failed — is the dashboard served by `nightshift watch`? ' + e); }
  setTimeout(tick, 300);
}
tick(); setInterval(tick, 2000);
</script>
</body>
</html>
